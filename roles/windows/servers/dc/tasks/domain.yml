---
# https://madlabber.wordpress.com/2019/09/08/creating-a-new-active-directory-forest-with-ansible/

- name: Change the hostname {{ inventory_hostname }}
  ansible.windows.win_hostname:
    name: "{{ inventory_hostname }}"

# IP change is async because changing the IP drops the WinRM connection.
# DNS is set in a separate synchronous task after wait_for confirms the new IP is up,
# so any failure is visible rather than silently skipped.
- name: Set static IP (primary DC)
  ansible.windows.win_powershell:
    script: |
      $if = (Get-NetAdapter | Where-Object { $_.Status -eq 'Up' -and $_.Name -like 'Ethernet*' } | Select-Object -First 1).Name
      netsh interface ip set address "$if" static {{ ansible_host }} {{ windows_mask }} {{ windows_gateway }}
  async: 100
  poll: 0
  vars:
    ansible_win_async_startup_timeout: 60
  when: inventory_hostname == groups['dc'][0]

- name: Set static IP (secondary DC)
  ansible.windows.win_powershell:
    script: |
      $if = (Get-NetAdapter | Where-Object { $_.Status -eq 'Up' -and $_.Name -like 'Ethernet*' } | Select-Object -First 1).Name
      netsh interface ip set address "$if" static {{ ansible_host }} {{ windows_mask }} {{ windows_gateway }}
  async: 100
  poll: 0
  vars:
    ansible_win_async_startup_timeout: 60
  when: inventory_hostname != groups['dc'][0]

- name: Wait for host to respond at new IP
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 5986
    delay: 10
    timeout: 120
    state: started
  delegate_to: localhost

- name: Set DNS (primary DC - loopback)
  ansible.windows.win_powershell:
    script: |
      $if = (Get-NetAdapter | Where-Object { $_.Status -eq 'Up' -and $_.Name -like 'Ethernet*' } | Select-Object -First 1).Name
      netsh interface ipv4 set dns name="$if" static 127.0.0.1 primary validate=no
      netsh interface ipv4 add dns name="$if" 8.8.8.8 index=2 validate=no
  when: inventory_hostname == groups['dc'][0]

- name: Set DNS (secondary DC - point to primary)
  ansible.windows.win_powershell:
    script: |
      $if = (Get-NetAdapter | Where-Object { $_.Status -eq 'Up' -and $_.Name -like 'Ethernet*' } | Select-Object -First 1).Name
      netsh interface ipv4 set dns name="$if" static {{ hostvars[groups['dc'][0]]['ansible_host'] }} primary validate=no
      netsh interface ipv4 add dns name="$if" 8.8.8.8 index=2 validate=no
  when: inventory_hostname != groups['dc'][0]

- name: Reboot for hostname change
  ansible.windows.win_reboot:
    reboot_timeout: 3600

- name: Install Active Directory
  ansible.windows.win_feature:
    name: AD-Domain-Services
    include_management_tools: true
    include_sub_features: true
    state: present

- name: Create "{{ Domain }}" Domain
  microsoft.ad.domain:
    dns_domain_name: "{{ Domain }}"
    safe_mode_password: Passw0rd!
  when: inventory_hostname == groups['dc'][0]

- name: New Domain creation reboot
  ansible.windows.win_reboot:
    reboot_timeout: 3600
  when: inventory_hostname == groups['dc'][0]

- name: Wait for primary DC LDAP before promoting
  ansible.builtin.wait_for:
    host: "{{ hostvars[groups['dc'][0]]['ansible_host'] }}"
    port: 389
    delay: 15
    timeout: 600
    state: started
  delegate_to: localhost
  when: inventory_hostname != groups['dc'][0]

- name: Promote {{ inventory_hostname }} as additional domain controller
  microsoft.ad.domain_controller:
    dns_domain_name: "{{ Domain }}"
    domain_admin_user: administrator@{{ Domain }}
    domain_admin_password: Passw0rd!
    safe_mode_password: Passw0rd!
    state: domain_controller
  when: inventory_hostname != groups['dc'][0]

- name: Wait for WinRM to be available after promotion reboot
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 5986
    delay: 30
    timeout: 600
    state: started
  delegate_to: localhost
  when: inventory_hostname != groups['dc'][0]
